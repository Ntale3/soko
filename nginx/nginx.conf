events {
    worker_connections 1024;
}

http {

    # ── Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstreams
    upstream auth_service           { server auth_service:8001; }
    upstream user_service           { server user_service:8002; }
    upstream produce_service        { server produce_service:8003; }
    upstream order_service          { server order_service:8004; }
    upstream payment_service        { server payment_service:8005; }
    upstream message_service        { server message_service:8006; }
    upstream notification_service   { server notification_service:8007; }
    upstream blog_service           { server blog_service:8008; }
    upstream ussd_service           { server ussd_service:8009; }
    upstream recommendation_service { server recommendation_service:8010; }

    server {
        listen 80;

        # ── CORS
        set $cors_origin "";
        if ($http_origin ~* "^https?://localhost:(3000|5173|4173)$") {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-User-Id, X-User-Role" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── NOTE: rate limiting is applied per-location below
        # ── NOT globally here — so we can skip it on webhooks/ussd/health

        # ────────────────────────────────────────
        # Auth Service — rate limited
        # ────────────────────────────────────────
        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://auth_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /oauth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://auth_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # User Service — rate limited
        # ────────────────────────────────────────
        location /users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://user_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # Produce Service — rate limited
        # ────────────────────────────────────────
        location /listings/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://produce_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            client_max_body_size 20M;
        }

        # ────────────────────────────────────────
        # Order Service — rate limited
        # ────────────────────────────────────────
        location /orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://order_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # Payment Service — rate limited
        # ────────────────────────────────────────
        location /payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://payment_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # PesaPal webhook — NO rate limiting
        location /webhook/ {
            proxy_pass       http://payment_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # Messaging Service — rate limited
        # ────────────────────────────────────────
        location /message/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://message_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # WebSocket — NO rate limiting (long-lived connection)
        location /message/ws/ {
            proxy_pass         http://message_service/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ────────────────────────────────────────
        # Notification Service — rate limited
        # ────────────────────────────────────────
        location /notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://notification_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # WebSocket — NO rate limiting
        location /notifications/ws/ {
            proxy_pass         http://notification_service/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ────────────────────────────────────────
        # Blog Service — rate limited
        # ────────────────────────────────────────
        location /posts/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://blog_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            client_max_body_size 10M;
        }

        # ────────────────────────────────────────
        # USSD Service — NO rate limiting
        # Africa's Talking sends POST here
        # ────────────────────────────────────────
        location /ussd/ {
            proxy_pass       http://ussd_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # Recommendation Service — rate limited
        # ────────────────────────────────────────
        location /recommendations/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://recommendation_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ────────────────────────────────────────
        # Health check — NO rate limiting
        # ────────────────────────────────────────
        location /health {
            return 200 "Soko API Gateway OK\n";
            add_header Content-Type text/plain;
        }
    }
}