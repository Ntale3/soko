events {
    worker_connections 1024;
}

http {

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    upstream auth_service           { server auth_service:8001; }
    upstream farmer_service         { server farmer_service:8002; }
    upstream buyer_service          { server buyer_service:8003; }
    upstream produce_service        { server produce_service:8004; }
    upstream recommendation_service { server recommendation_service:8005; }

    server {
        listen 80;

        # ── CORS ────────────────────────────────────────────────
        set $cors_origin "";
        if ($http_origin ~* "^http://localhost:(3000|5173|4173)$") {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
        # ── End CORS ─────────────────────────────────────────────

        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;

        location /auth/ {
            proxy_pass       http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /farmer/ {
            proxy_pass       http://farmer_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /buyer/ {
            proxy_pass       http://buyer_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /produce/ {
            proxy_pass       http://produce_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /recommendations/ {
            proxy_pass       http://recommendation_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            return 200 "API Gateway OK\n";
            add_header Content-Type text/plain;
        }
    }
}