name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint all services
        run: |
          ruff check services/auth/app \
                        services/farmer/app \
                        services/buyer/app \
                        services/produce/app \
                        services/recommendation/app

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d
        timeout-minutes: 10

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for all 5 services to respond..."
          for port in 8001 8002 8003 8004 8005; do
            for i in $(seq 1 40); do
              if curl -sf http://localhost:${port}/health > /dev/null 2>&1; then
                echo "Port ${port} is up."
                break
              fi
              if [ "$i" = "40" ]; then
                echo "Timed out waiting for port ${port}"
                docker compose logs
                exit 1
              fi
              echo "Port ${port} not ready, attempt $i — waiting 5s..."
              sleep 5
            done
          done
          echo "All services ready."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/integration/requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs
